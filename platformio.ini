; ================================================
; ESP32-C6 BLE Bridge – PlatformIO konfiguráció
; Board: Seeed XIAO ESP32-C6
; Framework: Arduino (ESP-IDF alapon)
; ================================================

[env:seeed_xiao_esp32c6]
platform = espressif32
board = seeed_xiao_esp32c6
framework = arduino

; NimBLE-Arduino library (Arduino-kompatibilis NimBLE wrapper)
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.1

; Serial monitor
monitor_speed = 115200

; Build flagek
build_flags =
    -D CONFIG_BT_ENABLED=1
    -D CONFIG_BT_NIMBLE_ENABLED=1
    -D CONFIG_BT_NIMBLE_ROLE_CENTRAL=1
    -D CONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
    -D CONFIG_BT_NIMBLE_ROLE_OBSERVER=1
    -D CONFIG_BT_NIMBLE_ROLE_BROADCASTER=1
    -D CONFIG_BT_NIMBLE_MAX_CONNECTIONS=5
    -D ARDUINO_USB_CDC_ON_BOOT=1